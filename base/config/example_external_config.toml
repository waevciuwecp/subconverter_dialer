version = 1
[custom]
enable_rule_generator = false
overwrite_original_rules = false

# Dialer options (Clash / ClashR / Singbox target)
#use_dialer = true
#dialer_group_name = "dialer"
#apply_dialer_to = "awesome|Scholar"
#singbox_version = "1.12.0" # supported: 1.12.x - 1.14.x

# Options for custom base configuration file
clash_rule_base = "base/forcerule.yml"
#surge_rule_base = "base/surge.conf"
#surfboard_rule_base = "base/surfboard.conf"
#mellow_rule_base = "base/mellow.conf"
#quan_rule_base = "base/quan.conf"
#quanx_rule_base = "base/quanx.conf"
#loon_rule_base = "base/loon.conf"
#sssub_rule_base = "base/shadowsocks_base.json"
#singbox_rule_base = "base/singbox.json"

# Options for adding emojis
#add_emoji = true
#remove_old_emoji = true

# Options for filtering nodes
#include_remarks = []
#exclude_remarks = []

#[[proxy_providers]]
#name = "sub-dialer-provider-1"
#type = "http"
#url = "https://example.com/sub.yaml"

#[[proxy_providers]]
#name = "relay-provider-1"
#type = "http"
#url = "https://example.com/relay.yaml"

[[custom_groups]]
import = "snippets/groups_forcerule.toml"
# `rule` and `proxies` are both accepted as the list field in TOML custom_groups.
# type = "relay"
# proxies = ["hop-1", "hop-2"]

#[[custom_groups]]
#name = "DialerLB"
#type = "load-balance-use"
#rule = ["(sub|dialer|relay)"]
#url = "http://www.gstatic.com/generate_204"
#interval = 6537
#tolerance = 100
#strategy = "round-robin"
# strategy supports: consistent-hashing, round-robin (invalid values fallback to consistent-hashing)

#[[rulesets]]
#import = ""

[[template_args]]
key = "clash.dns.port"
value = "5353"
